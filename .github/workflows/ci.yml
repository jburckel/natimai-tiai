name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # coverage comments on PRs

jobs:
  backend:
    name: Backend (lint · types · tests · coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tiai
          POSTGRES_PASSWORD: tiai
          POSTGRES_DB: tiai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tiai -d tiai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TIAI_TEST_DATABASE_URL: postgresql+psycopg://tiai:tiai@localhost:5432/tiai_test
      # Optional PAT (scope `gist`) to publish the coverage badge. Absent → badge step skipped.
      GIST_SECRET: ${{ secrets.GIST_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff format
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy app

      - name: Pytest (+ coverage)
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-report=json

      - name: Coverage comment (PR)
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          title: Couverture backend
          pytest-xml-coverage-path: backend/coverage.xml
          unique-id-for-comment: backend

      - name: Read backend coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.GIST_SECRET != ''
        id: cov
        run: echo "pct=$(node -p "Math.round(require('./coverage.json').totals.percent_covered)")" >> "$GITHUB_OUTPUT"

      - name: Coverage badge (gist)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.GIST_SECRET != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 80b72bc52448a36bc1a08370a68c88a1
          filename: tiai-coverage-backend.json
          label: couverture backend
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 30
          maxColorRange: 90

  frontend:
    name: Frontend (format · tests · coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      GIST_SECRET: ${{ secrets.GIST_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Tests (+ coverage)
        run: npm run test:coverage

      - name: Coverage comment (PR)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: frontend
          name: Couverture frontend

      - name: Read frontend coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.GIST_SECRET != ''
        id: cov
        run: echo "pct=$(node -p "Math.round(require('./coverage/coverage-summary.json').total.lines.pct)")" >> "$GITHUB_OUTPUT"

      - name: Coverage badge (gist)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.GIST_SECRET != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 80b72bc52448a36bc1a08370a68c88a1
          filename: tiai-coverage-frontend.json
          label: couverture frontend
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 30
          maxColorRange: 90
