name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · types · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tiai
          POSTGRES_PASSWORD: tiai
          POSTGRES_DB: tiai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tiai -d tiai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TIAI_TEST_DATABASE_URL: postgresql+psycopg://tiai:tiai@localhost:5432/tiai_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff format
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (format · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Unit tests
        run: npm test
